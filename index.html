<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myAxara LMS - Learning Dashboard</title>
    <meta name="description" content="Platform belajar interaktif dan video SOP untuk karyawan." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="myAxara LMS" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="myAxara LMS - Learning Dashboard" />
    <meta property="og:description" content="Platform belajar interaktif dan video SOP untuk karyawan." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lms.myaxara.com/" />
    <meta property="og:image" content="https://hr.myaxara.com/myaxara-logo.svg" />
    <meta property="og:site_name" content="myAxara LMS" />
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var h = window.location.hash;
        if (h.includes('type=invite') && h.includes('access_token')) {
          sessionStorage.setItem('axara_invite_hash', h);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then(reg => {
              console.log('Service Worker registered successfully:', reg.scope);
              
              // Detect if there's a waiting service worker (an update was found in the background)
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('New update available. It will apply on next reload.');
                    // In a more complex app we'd show a toast here. 
                    // Since sw.js calls skipWaiting(), controllerchange will fire immediately.
                  }
                });
              });
            })
            .catch(err => console.log('Service Worker registration failed:', err));
            
          // No reload on controllerchange. For a SPA, the new SW takes effect immediately
          // for all future fetches. Forcing a reload mid-session causes blank white screen
          // on Android PWA — the user loses their current state for no real benefit.
        });
      }
    </script>
  </body>
</html>
